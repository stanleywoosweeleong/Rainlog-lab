<!-- RainLog 雨量记录 — WeatherNext family UI — last 3 full months + current month to yesterday · Open-Meteo -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RainLog Lab · 雨量记录实验</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RainLog Lab">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#84d2f8">
<meta name="format-detection" content="telephone=no">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjogIumbqOmHj+iusOW9lSBSYWluTG9nIiwgInNob3J0X25hbWUiOiAi6Zuo6YeP6K6w5b2VIiwgInN0YXJ0X3VybCI6ICIuIiwgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsICJiYWNrZ3JvdW5kX2NvbG9yIjogIiM4NGQyZjgiLCAidGhlbWVfY29sb3IiOiAiIzg0ZDJmOCIsICJpY29ucyI6IFt7InNyYyI6ICJpY29uLTE5Mi5wbmciLCAic2l6ZXMiOiAiMTkyeDE5MiIsICJ0eXBlIjogImltYWdlL3BuZyIsICJwdXJwb3NlIjogImFueSBtYXNrYWJsZSJ9LCB7InNyYyI6ICJpY29uLTUxMi5wbmciLCAic2l6ZXMiOiAiNTEyeDUxMiIsICJ0eXBlIjogImltYWdlL3BuZyIsICJwdXJwb3NlIjogImFueSBtYXNrYWJsZSJ9XX0=">
<style>
  :root{
    --safe-top:env(safe-area-inset-top);
    --safe-bottom:env(safe-area-inset-bottom);
    --blue:#1d4ed8; --blue-deep:#1e3a5f; --sky:#84d2f8;
    --slate-900:#0f172a; --slate-700:#334155; --slate-600:#475569;
    --slate-500:#64748b; --slate-400:#94a3b8; --slate-300:#cbd5e1;
    --slate-200:#e2e8f0; --slate-100:#f1f5f9; --slate-50:#f8fafc;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{line-height:1.5;-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--slate-100); color:#000; margin:0; padding:0;
    -webkit-font-smoothing:antialiased; min-height:100vh;
    user-select:none; -webkit-user-select:none;
    padding-bottom:calc(48px + var(--safe-bottom));
  }
  .tabular{font-variant-numeric:tabular-nums}
  header{
    background:#fff; border-bottom:2px solid var(--slate-100);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:0 18px; padding-top:var(--safe-top);
    height:calc(76px + var(--safe-top));
    position:sticky; top:0; z-index:50;
  }
  .h-left{display:flex; align-items:center; gap:10px; min-width:0; flex:0 1 auto}
  .h-title{min-width:0; overflow:hidden}
  .icon-tile{
    width:34px; height:34px; background:var(--blue); border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
    flex:none;
  }
  .icon-tile img{width:34px; height:34px; border-radius:11px; display:block;}
  .h-title h1{
    font-size:20px; font-weight:900; letter-spacing:-.03em; line-height:1;
    color:var(--slate-900); margin:0; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
  }
  .h-title .sub{
    font-size:11px; font-weight:700; color:var(--slate-400);
    margin-top:5px; text-transform:uppercase; letter-spacing:.02em;
  }
  .h-actions{display:flex; align-items:center; gap:3px; flex:none}
  .add-btn{
    display:flex; align-items:center; justify-content:center; width:38px; height:38px;
    background:none; color:var(--blue);
    border:none; cursor:pointer; transition:transform .15s; flex:none;
  }
  .add-btn:active{transform:scale(.9)}
  .info-btn{
    display:flex; align-items:center; justify-content:center; width:34px; height:38px;
    background:none; color:var(--blue);
    border:none; cursor:pointer; transition:transform .15s; flex:none;
  }
  .info-btn:active{transform:scale(.9)}
  /* Battery-saving OLED dark theme — active only while drive-mode fetch runs.
     True black (#000) turns OLED pixels off, unlike dark-grey which barely saves. */
  body.drive-dark{background:#000; color:#c7ccd1}
  body.drive-dark header,
  body.drive-dark .card,
  body.drive-dark .stat,
  body.drive-dark .dry-wrap,
  body.drive-dark .dry-stat,
  body.drive-dark .dt-wrap,
  body.drive-dark .mini-wrap,
  body.drive-dark .thresh-toggle,
  body.drive-dark .thresh-seg,
  body.drive-dark .lg-count,
  body.drive-dark .loc-filter,
  body.drive-dark .export-all-btn{background:#000; border-color:#1a1a1a; color:#c7ccd1}
  body.drive-dark .stat.rain,
  body.drive-dark .stat.days{background:#050505}
  body.drive-dark img,
  body.drive-dark .mini-bar,
  body.drive-dark .month-fill,
  body.drive-dark .act-get,
  body.drive-dark .act-xls{filter:brightness(.72)}
  body.drive-dark #driveBtn.driving svg{color:#c7ccd1}
  body.drive-dark *{transition:none !important}

  /* drive mode: button pulses while running, with a progress badge */
  #driveBtn{position:relative}
  #driveBtn.driving svg{animation:drivePulse 1.4s ease-in-out infinite}
  @keyframes drivePulse{0%,100%{opacity:1}50%{opacity:.4}}
  #driveBtn.driving[data-prog]::after{content:attr(data-prog);position:absolute;
    top:-7px;left:50%;transform:translateX(-30%);background:var(--blue);color:#fff;
    font-size:9px;font-weight:800;line-height:1;padding:2px 5px;border-radius:9999px;
    white-space:nowrap;animation:none;opacity:1;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .lang-btn{
    background:none; color:var(--blue);
    border:none; border-radius:9999px;
    height:38px; padding:0 6px; font-size:14px; font-weight:900;
    cursor:pointer; flex:none; transition:transform .15s, background .15s, color .15s;
  }
  .lang-btn:active{transform:scale(.9)}
  main{max-width:760px; margin:0 auto; padding:14px}
  .attrib{
    display:flex; justify-content:center;
    margin-top:18px; padding-bottom:calc(10px + var(--safe-bottom));
  }
  .attrib a{
    font-size:11px; font-weight:600; color:var(--slate-400);
    text-decoration:none; letter-spacing:.01em;
    padding:4px 10px; border-radius:9999px; border:1px solid var(--slate-200);
    background:var(--slate-100);
  }
  .attrib a:hover{color:var(--blue); border-color:#bfdbfe}
  .loc-list{display:flex; flex-direction:column; gap:12px}
  /* RainLog Lab: search filter + region accordion */
  .export-all-btn{display:flex; align-items:center; justify-content:center; gap:7px;
    width:100%; box-sizing:border-box; background:var(--slate-100); color:var(--slate-700);
    border:1px solid var(--slate-200); border-radius:10px; padding:10px 13px; margin-bottom:12px;
    font-size:14px; font-weight:600; font-family:inherit; cursor:pointer}
  .export-all-btn:active{transform:scale(.99); background:var(--slate-200)}
  .loc-filter{width:100%; box-sizing:border-box; background:#fff; border:1px solid var(--slate-300);
    color:var(--slate-900); border-radius:10px; padding:10px 13px; font-size:15px;
    font-family:inherit; margin-bottom:12px}
  .loc-filter:focus{outline:2px solid var(--blue); outline-offset:0; border-color:var(--blue)}
  .loc-group-h{display:flex; align-items:center; gap:9px; cursor:pointer; user-select:none;
    background:var(--slate-100); border:1px solid var(--slate-200); border-radius:11px;
    padding:13px 15px; flex-wrap:wrap}
  .loc-group-h:active{transform:scale(.995)}
  .lg-caret{color:var(--slate-500); font-size:12px; width:12px; flex-shrink:0}
  .lg-name{font-size:15px; font-weight:700; color:var(--slate-900); flex-shrink:0}
  .loc-group-h.open .lg-name{color:var(--blue)}
  .lg-count{font-size:12px; font-weight:700; color:var(--slate-600); background:#fff;
    border:1px solid var(--slate-200); border-radius:9999px; padding:1px 10px; min-width:22px;
    text-align:center; margin-left:auto; flex-shrink:0}
  .loc-group-body{display:flex; flex-direction:column; gap:12px; margin:12px 0 4px 6px;
    padding-left:10px; border-left:2px solid var(--slate-200)}
  .lg-refresh{background:#fff; border:1px solid var(--slate-300); color:var(--blue);
    font-size:14px; font-weight:700; min-width:30px; height:26px; padding:0 8px;
    border-radius:9999px; cursor:pointer; margin-left:auto; line-height:1}
  .lg-refresh:active{transform:scale(.94)}
  .loc-group-h .lg-count{margin-left:8px}
  .toast{position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(20px);
    background:var(--slate-900); color:#fff; padding:11px 18px; border-radius:10px;
    font-size:14px; font-weight:600; opacity:0; pointer-events:none; transition:.25s; z-index:90;
    box-shadow:0 8px 24px rgba(0,0,0,.25); max-width:80vw; text-align:center}
  .toast.on{opacity:1; transform:translateX(-50%) translateY(0)}

  /* rainy-day threshold toggle */
  .thresh-toggle{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:#fff; border-radius:14px; padding:10px 12px 10px 14px; margin-bottom:12px;
    box-shadow:0 1px 2px 0 rgba(0,0,0,.05);
  }
  .thresh-label{font-size:15px; font-weight:900; color:var(--slate-700); letter-spacing:-.01em}
  .thresh-seg{display:flex; gap:3px; background:var(--slate-100); border-radius:9px; padding:3px; flex:none}
  .thresh-opt{
    border:none; background:none; cursor:pointer; border-radius:7px;
    padding:6px 11px; font-size:12px; font-weight:900; color:var(--slate-600);
    white-space:nowrap; transition:all .15s; line-height:1.2;
  }
  .thresh-opt small{display:block; font-size:10px; font-weight:800; color:var(--slate-500); letter-spacing:.02em; margin-top:1px}
  .thresh-opt.on{background:#fff; color:var(--blue); box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .thresh-opt.on small{color:#2563eb}

  /* Action bar: on mobile it drops DOWN below the card content as a row of 3 buttons;
     on desktop (>=760px) it overlays the right edge (sliding in). */
  .card-wrap{
    position:relative; width:100%; border-radius:16px; overflow:hidden;
    background:#fff;
    box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
    isolation:isolate;
  }
  /* --- mobile default: drop-down row below the card --- */
  .swipe-actions{
    display:flex; width:100%; overflow:hidden;
    max-height:0; opacity:0;
    transition:max-height .24s cubic-bezier(.2,.8,.2,1), opacity .18s;
    border-top:0 solid var(--slate-100);
  }
  .card-wrap.actions-open .swipe-actions{
    max-height:64px; opacity:1; border-top-width:1px;
  }
  .action-btn{
    flex:1; display:flex; align-items:center; justify-content:center;
    border:none; cursor:pointer; color:#fff; height:60px;
    -webkit-tap-highlight-color:transparent;
  }
  .action-btn:active{filter:brightness(.92)}
  .btn-share{background:#10b981}
  .btn-edit{background:#3b82f6}
  .btn-delete{background:#ef4444}
  .card{
    position:relative; z-index:10; background:#fff; width:100%;
  }
  .action-btn svg{width:26px; height:26px}

  /* --- desktop: overlay on the right edge (sliding in), card content unshifted --- */
  @media(min-width:760px){
    .swipe-actions{
      position:absolute; top:0; bottom:0; right:0; width:168px; max-height:none; opacity:1;
      z-index:20; border-top:0;
      transform:translateX(100%);
      transition:transform .2s cubic-bezier(.2,.8,.2,1);
    }
    .card-wrap.actions-open .swipe-actions{ transform:translateX(0); max-height:none; }
    .action-btn{height:auto}
    .card-wrap.actions-open .card-head,
    .card-wrap.actions-open .card-body{
      padding-right:180px; transition:padding-right .2s cubic-bezier(.2,.8,.2,1);
    }
  }
  .card-head{display:flex; align-items:center; gap:12px; padding:14px 16px 10px}
  .pin{
    width:38px; height:38px; border-radius:11px; flex:none;
    background:linear-gradient(135deg,#38bdf8 0%,#0284c7 100%);
    display:flex; align-items:center; justify-content:center; font-size:19px;
    box-shadow:0 1px 2px 0 rgba(0,0,0,.05);
  }
  .card-name-wrap{flex:1; min-width:0}
  .card-name{
    font-size:18px; font-weight:900; letter-spacing:-.02em; color:var(--slate-900);
    line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .card-coords{font-size:12px; font-weight:700; color:var(--slate-400); margin-top:2px}
  .grip{
    color:var(--slate-300); flex:none; display:flex; align-items:center; justify-content:center;
    width:36px; height:36px; margin:-6px -8px -6px 0; padding:0;
    border:none; background:none; cursor:pointer; border-radius:9px;
    transition:color .15s, background .15s; -webkit-tap-highlight-color:transparent;
  }
  .grip:hover{color:var(--slate-500); background:var(--slate-100)}
  .grip:active{transform:scale(.9)}

  /* recycle-bin entry link (on Add view) */
  .bin-entry{
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    margin-top:14px; padding:11px; border:none; background:none; cursor:pointer;
    color:var(--slate-500); font-size:13px; font-weight:800; transition:color .15s;
  }
  .bin-entry:hover{color:var(--slate-700)}
  .bin-entry-count{
    min-width:18px; height:18px; padding:0 5px; background:#ef4444; color:#fff;
    font-size:10px; font-weight:900; border-radius:9999px;
    display:flex; align-items:center; justify-content:center;
  }
  .bin-entry-count.hidden{display:none}
  /* back-to-add link (on Recycle view) */
  .bin-back{
    display:flex; align-items:center; gap:7px; margin-bottom:14px; padding:6px 0;
    border:none; background:none; cursor:pointer; color:var(--blue);
    font-size:14px; font-weight:800;
  }
  .bin-back:active{opacity:.6}


  .bin-row{
    display:flex; align-items:center; gap:10px; background:var(--slate-50);
    border:1px solid var(--slate-100); border-radius:12px; padding:11px 12px; margin-bottom:8px;
  }
  .bin-info{flex:1; min-width:0}
  .bin-name{font-size:15px; font-weight:900; color:var(--slate-700); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bin-coords{font-size:11px; font-weight:700; color:var(--slate-400); margin-top:1px}
  .bin-btn{border:none; border-radius:9px; padding:9px 12px; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.03em; cursor:pointer; flex:none; transition:transform .15s}
  .bin-btn:active{transform:scale(.92)}
  .bin-restore{background:#dbeafe; color:var(--blue)}
  .bin-purge{background:#fee2e2; color:#dc2626}

  .card-body{padding:0 16px 14px}
  .stat-row{display:flex; gap:10px; margin-bottom:12px}
  .stat{
    flex:1; min-width:0; border-radius:12px; padding:11px 13px;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .stat.rain{background:#eff6ff}
  .stat.days{background:#ecfdf5}
  .stat .n{font-size:26px; font-weight:900; line-height:1; letter-spacing:-.03em; flex:0 0 auto; white-space:nowrap; text-align:right}
  .stat.rain .n{color:var(--blue)}
  .stat.days .n{color:#047857}
  .stat .l{font-size:13px; font-weight:900; line-height:1.15; flex:1 1 auto; min-width:0; word-break:keep-all; overflow-wrap:break-word}
  .stat.rain .l{color:#1d4ed8}
  .stat.days .l{color:#047857}
  .stat .su{font-size:12px; font-weight:900; margin-left:1px; opacity:.85}

  /* 18-day mini bar strip */
  /* dry-spell tracker (flowering-induction signal) */
  .dry-wrap{background:#fffbeb; border:1px solid #fef3c7; border-radius:12px; padding:11px 12px 12px; margin-bottom:12px}
  .dry-cap{font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:.03em; color:#b45309; margin-bottom:9px}
  .dry-row{display:flex; gap:10px}
  .dry-stat{
    flex:1; min-width:0; background:#fff; border:1px solid #fde68a; border-radius:10px;
    padding:11px 13px; display:flex; align-items:center; justify-content:space-between; gap:6px;
  }
  .dry-stat.hot{background:#fff7ed; border-color:#fdba74}
  .dry-n{font-size:28px; font-weight:900; line-height:1; color:#c2410c; letter-spacing:-.02em; flex:none; white-space:nowrap}
  .dry-stat.hot .dry-n{color:#ea580c}
  .dry-u{font-size:13px; font-weight:900; margin-left:1px}
  .dry-l{font-size:14px; font-weight:900; color:#92400e; line-height:1.2; flex:1; min-width:0; word-break:keep-all}
  .dry-range{display:block; font-size:11px; font-weight:700; color:#b45309; letter-spacing:0; margin-top:2px}
  /* staged bud-emergence flag banner */
  .dry-flag{display:flex; align-items:center; gap:8px; border-radius:10px; padding:8px 11px; margin-bottom:9px; font-weight:900; line-height:1.25}
  .dry-flag .df-ic{font-size:16px; flex:none}
  .dry-flag .df-t{font-size:13px; min-width:0}
  .dry-flag.near{background:#fff7ed; border:1px solid #fdba74; color:#c2410c}
  .dry-flag.prime{background:#ecfdf5; border:1px solid #6ee7b7; color:#047857}
  .dry-flag.past{background:#f1f5f9; border:1px solid #cbd5e1; color:#475569}
  .dry-alltime{font-size:11px; font-weight:700; color:#b45309; text-align:right; margin-top:7px; opacity:.85}

  /* Delta-T trendline (historical spray-condition reference) */
  .dt-wrap{background:var(--slate-50); border:1px solid var(--slate-100); border-radius:12px; padding:10px 12px 8px; margin-bottom:12px}
  .dt-cap{font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.02em; color:var(--slate-600); margin-bottom:6px; display:flex; justify-content:space-between; align-items:flex-start; gap:8px}
  .dt-cap>span:first-child{flex:1; min-width:0; line-height:1.3}
  .dt-sub{white-space:nowrap}
  .dt-now{font-weight:800; color:#4f46e5; text-transform:none; letter-spacing:0; flex:none; white-space:nowrap}
  .dt-svg{display:block; width:100%; height:120px}
  .dt-axis{display:flex; justify-content:space-between; font-size:9px; font-weight:700; color:var(--slate-400); margin-top:2px}
  .dt-ref{font-size:11px; font-weight:700; color:var(--slate-600); margin-top:7px; line-height:1.45}
  .dt-legend{display:flex; gap:14px; margin-bottom:4px}
  .dt-legend span{display:flex; align-items:center; gap:5px; font-size:10px; font-weight:800; color:var(--slate-500)}
  .dt-legend i{width:14px; height:0; border-top:2px solid currentColor; display:inline-block}
  .dt-legend .dot-dt{color:#6366f1}
  .dt-legend .dot-temp{color:#f59e0b}

  .mini-wrap{background:var(--slate-50); border:1px solid var(--slate-100); border-radius:12px; padding:10px 12px 8px; margin-bottom:12px}
  .mini-cap{font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.03em; color:var(--slate-600); margin-bottom:8px; display:flex; justify-content:space-between; align-items:center}
  .mini-cap .mx{font-weight:800; color:var(--slate-600); text-transform:none; letter-spacing:0}
  .mini-bars{display:flex; align-items:flex-end; gap:3px; height:46px}
  .mini-col{flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; height:100%}
  .mini-bar{width:100%; min-height:2px; border-radius:3px 3px 0 0; background:#bfdbfe}
  .mini-bar.wet{background:linear-gradient(180deg,#38bdf8 0%,#1d4ed8 100%)}
  .mini-bar.dry{background:var(--slate-200)}
  .mini-bar.nodata{background:repeating-linear-gradient(45deg,var(--slate-100),var(--slate-100) 2px,#fff 2px,#fff 4px); border:1px dashed var(--slate-200)}
  .mini-axis{display:flex; justify-content:space-between; font-size:9px; font-weight:700; color:var(--slate-400); margin-top:5px}

  /* monthly rollup */
  .month-wrap{margin-bottom:12px}
  .month-cap{font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.04em; color:var(--slate-500); margin-bottom:7px}
  .month-row{display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--slate-100)}
  .month-row:last-child{border-bottom:none}
  .month-name{font-size:13px; font-weight:900; color:var(--slate-700); width:62px; flex:none}
  .month-track{flex:1; height:8px; background:var(--slate-100); border-radius:5px; overflow:hidden}
  .month-fill{height:100%; border-radius:5px; background:linear-gradient(90deg,#38bdf8 0%,#1d4ed8 100%)}
  .month-mm{font-size:13px; font-weight:900; color:var(--blue); width:62px; text-align:right; flex:none; font-variant-numeric:tabular-nums}
  .month-days{font-size:12px; font-weight:900; color:#047857; width:40px; text-align:right; flex:none; font-variant-numeric:tabular-nums}
  .month-partial{color:#c8842b; font-weight:900; margin-left:2px}
  .month-note{font-size:11px; font-weight:700; color:var(--slate-600); margin-top:8px; line-height:1.45}

  .btn-row{display:flex; gap:8px}
  .act{
    flex:1; border:none; border-radius:10px; padding:12px 8px;
    font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:.04em;
    color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
    gap:6px; box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
    transition:transform .15s; line-height:1.2;
  }
  .act:active{transform:scale(.95)}
  .act:disabled{opacity:.45; box-shadow:none; transform:none; cursor:default}
  .act-get{background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%)}
  .act-xls{background:linear-gradient(135deg,#059669 0%,#047857 100%)}
  .card-status{font-size:12px; font-weight:700; text-align:center; margin-top:9px; min-height:1em; color:var(--slate-400)}
  .empty{text-align:center; padding:56px 24px; color:var(--slate-400)}
  .empty .big{font-size:52px; margin-bottom:12px}
  .empty .t{font-size:17px; font-weight:900; color:var(--slate-600)}
  .empty .d{font-size:13px; font-weight:600; margin-top:6px}
  /* full-screen user guide */
  .guide-overlay{
    position:fixed; left:0; right:0; bottom:0;
    top:calc(76px + var(--safe-top));   /* start below the sticky header */
    z-index:45;                          /* above attrib pill, below header (50) */
    background:var(--slate-50);
    display:flex; flex-direction:column;
    transform:translateY(100%); transition:transform .28s cubic-bezier(.2,.8,.2,1);
    visibility:hidden;
  }
  .guide-overlay.on{transform:translateY(0); visibility:visible}
  .guide-top{
    flex:none; display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px 14px; background:#fff;
    border-bottom:1px solid var(--slate-200);
  }
  .guide-top-title{font-size:19px; font-weight:900; color:var(--slate-900); letter-spacing:-.02em}
  .guide-close{
    width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    border:none; background:var(--slate-100); border-radius:9999px; color:var(--slate-600);
    cursor:pointer; flex:none; transition:transform .15s;
  }
  .guide-close:active{transform:scale(.9)}
  .guide-body{
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:18px 18px calc(40px + var(--safe-bottom)); max-width:680px; width:100%; margin:0 auto;
  }
  .g-sec{margin-bottom:22px}
  .g-h{display:flex; align-items:center; gap:10px; margin-bottom:8px}
  .g-ico{
    width:30px; height:30px; flex:none; border-radius:9px; display:flex; align-items:center; justify-content:center;
    font-size:16px;
  }
  .g-h h3{font-size:16px; font-weight:900; color:var(--slate-900); letter-spacing:-.01em}
  .g-sec p{font-size:14px; font-weight:500; color:var(--slate-600); line-height:1.6; margin-left:40px}
  .g-sec p b{font-weight:900; color:var(--slate-800)}
  .g-intro{font-size:14px; font-weight:600; color:var(--slate-600); line-height:1.6; margin-bottom:24px;
    background:#fff; border:1px solid var(--slate-200); border-radius:12px; padding:14px 16px}
  .g-foot{font-size:12px; font-weight:600; color:var(--slate-400); line-height:1.6; text-align:center;
    margin-top:8px; padding-top:18px; border-top:1px solid var(--slate-200)}
  .g-qr{margin:26px 0 8px; text-align:center}
  .g-qr-title{font-size:15px; font-weight:900; color:var(--slate-800); margin-bottom:12px}
  .g-qr-box{display:inline-block; background:#fff; padding:14px; border-radius:16px; border:1px solid var(--slate-200);
    box-shadow:0 4px 6px -1px rgba(0,0,0,.06)}
  .g-qr-box svg{display:block}
  .g-qr-sub{font-size:12px; font-weight:600; color:var(--slate-500); margin-top:10px; line-height:1.5}

  .overlay{
    position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:1000;
    display:none; align-items:flex-end; justify-content:center;
  }
  .overlay.on{display:flex}
  .sheet{
    background:#fff; width:100%; max-width:760px;
    border-radius:22px 22px 0 0; padding:22px 18px;
    padding-bottom:calc(26px + var(--safe-bottom));
    max-height:92vh; overflow:auto; position:relative;
  }
  .sheet h2{font-size:19px; font-weight:900; color:var(--slate-900); margin:0 0 4px; letter-spacing:-.02em}
  .sheet .sd{font-size:13px; font-weight:600; color:var(--slate-500); margin-bottom:16px}
  .x-btn{
    position:absolute; top:16px; right:16px; background:none; border:none;
    color:var(--slate-300); cursor:pointer; padding:6px; line-height:1;
  }
  label{display:block; font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.06em; color:var(--slate-500); margin:14px 0 6px}
  input{
    width:100%; border:1.5px solid var(--slate-200); border-radius:11px;
    padding:13px; font-size:17px; font-weight:600; background:#fff; color:var(--slate-900);
    font-family:inherit;
  }
  input::placeholder{font-weight:400; color:var(--slate-400)}
  input:focus{outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(29,78,216,.12)}
  .coord-pair{display:flex; gap:10px}
  .coord-pair>div{flex:1}
  .gps-btn{
    width:100%; margin-top:12px; background:#eff6ff; color:var(--blue);
    border:1.5px solid #bfdbfe; border-radius:11px; padding:13px;
    font-size:14px; font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:.03em;
    display:flex; align-items:center; justify-content:center; gap:8px; transition:transform .15s;
  }
  .gps-btn:active{transform:scale(.97)}
  .gps-status{font-size:12px; font-weight:700; text-align:center; margin-top:8px; min-height:1em; color:var(--slate-400)}
  .sheet-actions{display:flex; gap:10px; margin-top:22px}
  .s-act{flex:1; border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:900; cursor:pointer; transition:transform .15s; letter-spacing:.02em}
  .s-act:active{transform:scale(.96)}
  .s-cancel{background:var(--slate-100); color:var(--slate-600)}
  .s-save{background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%); color:#fff; box-shadow:0 4px 6px -1px rgba(29,78,216,.25)}
  .spin{display:inline-block; width:14px; height:14px; border:2.5px solid rgba(255,255,255,.45); border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  @keyframes bootspin{to{transform:rotate(360deg)}}
  @media(min-width:760px){
    .overlay{align-items:center}
    .sheet{border-radius:22px; max-height:86vh}
  }
  @media(max-width:430px){
    /* stack each tile: label on top row, big number on its own row below */
    .stat{
      flex-direction:column; align-items:flex-start; justify-content:center;
      gap:4px; padding:11px 13px;
    }
    .stat .l{font-size:13px; line-height:1.2; flex:none; width:100%}
    .stat .n{font-size:27px; text-align:left; width:100%}
    .stat.rain .n{font-size:27px}
    .stat .su, .dry-u{font-size:12px}
    /* dry tiles: same two-row stack — label (+ date range) on top, number below */
    .dry-stat{
      flex-direction:column; align-items:flex-start; justify-content:space-between;
      gap:4px; padding:11px 13px;
    }
    .dry-l{font-size:13px; line-height:1.2; flex:none; width:100%}
    .dry-n{font-size:27px; text-align:left; width:100%; margin-top:auto}
  }
  @media(max-width:380px){
    .h-title h1{font-size:18px}
    .stat .n, .dry-n{font-size:24px}
  }
  @media(max-width:360px){
    .stat .n, .dry-n{font-size:22px}
    .stat .l, .dry-l{font-size:12px}
  }
</style>
</head>

const SEED_VERSION = 5;
const SEED_FLAG = NS+".seeded";
const SEED_VER_KEY = NS+".seedVersion";
const REGION_RENAMES = { "Jerantut":"Jerantut 而连突", "Miketam":"Miketam 苏晓薇" };

(function seedFarms(){
  const seeded = localStorage.getItem(SEED_FLAG)==="1";
  const ver = parseInt(localStorage.getItem(SEED_VER_KEY)||"0",10);
  if(!seeded && locations.length===0){
    locations = SEED_FARMS.map(([name,lat,lng,region],i)=>({
      id:"L"+Date.now().toString(36)+i.toString(36), name, lat, lng, region
    }));
    localStorage.setItem(SEED_FLAG,"1");
    localStorage.setItem(SEED_VER_KEY,String(SEED_VERSION));
    saveLoc_();
  } else if(seeded && ver < SEED_VERSION){
    // rename outdated region labels first (avoids creating duplicates)
    for(const loc of locations){
      if(loc.region && REGION_RENAMES[loc.region]) loc.region = REGION_RENAMES[loc.region];
    }
    // back-fill region onto farms lacking it (match by coordinate)
    for(const loc of locations){
      if(loc.region) continue;
      const hit = SEED_FARMS.find(([n,la,lo])=>
        Math.abs(la-(+loc.lat))<1e-4 && Math.abs(lo-(+(loc.lng??loc.lon)))<1e-4);
      if(hit) loc.region = hit[3];
    }
    // add any (name+region) seed entry not present
    const have = new Set(locations.map(l=>`${l.name}@@${l.region||""}`));
    SEED_FARMS.forEach(([name,lat,lng,region],i)=>{
      if(!have.has(`${name}@@${region}`)){
        locations.push({ id:"Lm"+Date.now().toString(36)+i.toString(36), name, lat, lng, region });
        have.add(`${name}@@${region}`);
      }
    });
    localStorage.setItem(SEED_VER_KEY,String(SEED_VERSION));
    saveLoc_();
  }
})();

  if(expandedGroups===null) expandedGroups=new Set();
  let html="";
  for(const [region,locs] of groups){
    const open = filtering || expandedGroups.has(region);

    html+=`<div class="loc-group-h${open?' open':''}" onclick="toggleGroup('${rid}')">

/* Bulk-refresh every farm in one region, throttled to 2 concurrent requests so the
   Open-Meteo API is never hammered (pairs with the new accordion). Shows progress in
   the group header and a toast when done. */
let _refreshing=false;
async function refreshRegion(region){
  if(_refreshing) return;
  const farms=locations.filter(l=>(l.region||tr("ungrouped"))===region);
  if(!farms.length) return;
  _refreshing=true;
  let done=0, failed=0;
  const headBtn=[...document.querySelectorAll(".lg-refresh")].find(b=>b.getAttribute("onclick")?.includes(`refreshRegion('${region.replace(/'/g,"\\'")}')`));
  const setProg=()=>{ if(headBtn) headBtn.textContent=`${done}/${farms.length}`; };
  setProg();
  await runPooled(farms, async(loc)=>{
    const okR=await getRain(loc.id,{quiet:true});
    done++; if(!okR) failed++; setProg();
  }, 2);
  _refreshing=false;
  render();
  toast(failed? tr("regionDonePartial")(done-failed,farms.length) : tr("regionDone")(farms.length));
}

/* lightweight toast */
let _toastT=null;
function toast(msg){
  let el=document.getElementById("toast");
  if(!el){ el=document.createElement("div"); el.id="toast"; el.className="toast"; document.body.appendChild(el); }
  el.textContent=msg; el.classList.add("on");
  clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove("on"),2600);
}

/* ---------- Drive mode: fetch every orchard, slowly ----------
   Tap before leaving for the orchard; by the time you arrive all farms are gathered.
   Paced one farm at a time with a gap between each, so it never trips Open-Meteo's
   rate limiter. Skips farms whose data is already from today. Pausable (tap again to
   stop) and resumable — a phone call or signal drop won't lose progress; getRain
   already retries on 429/503. */
const DRIVE_GAP_MS = 2200;          // baseline gap between orchards (~27 req/min)
const DRIVE_GAP_MAX = 12000;        // ceiling when Open-Meteo is throttling
let RATE_LIMIT_HITS = 0;            // set by fetchJSON on any 429/503
let RATE_LIMIT_UNTIL = 0;           // wall-clock ms: hold the loop until at least this time
let driveRunning = false;
let driveAbort = false;
function driveSleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function isFarmDoneToday(loc){
  const c=cache[loc.id];
  if(!(c && c.days && c.days.length && !isFromPreviousDay(c.fetched))) return false;
  // Not "done" if history is still incomplete — let drive mode backfill it even
  // though it was already touched today. `coveredFrom` marks the earliest date a
  // prior fetch reached; if it hasn't reached the 16-month start, there's a gap.
  const now=new Date();
  const wStart=ymd(new Date(now.getFullYear(), now.getMonth()-15, 1)); // 16-month start (HISTORY_MONTHS-1)
  if(!c.coveredFrom || c.coveredFrom > wStart) return false;
  return true;
}

async function fetchAllSlowly(){
  if(driveRunning){ driveAbort=true; return; }   // tap again = stop
  const btn=document.getElementById("driveBtn");
  if(!locations.length){ toast(tr("driveNone")); return; }

  driveRunning=true; driveAbort=false;
  if(btn) btn.classList.add("driving");
  document.body.classList.add("drive-dark");   // battery-saving OLED theme while fetching
  let wake=null;
  try{ if(navigator.wakeLock) wake=await navigator.wakeLock.request("screen"); }catch(_){}

  let done=0, failed=0, skipped=0;
  RATE_LIMIT_HITS=0; RATE_LIMIT_UNTIL=0;   // reset throttle tracking for this run
  const setBadge=()=>{ if(btn) btn.setAttribute("data-prog",`${done+skipped}/${locations.length}`); };
  setBadge();
  toast(tr("driveStart")(locations.length));

  for(const loc of locations){
    if(driveAbort) break;
    // Skip orchards already fully fetched today; getRain auto-backfills any that
    // still have an older gap (first run after this update rebuilds them once).
    if(isFarmDoneToday(loc)){ skipped++; setBadge(); continue; }
    const okR=await getRain(loc.id,{quiet:true});
    if(okR) done++; else failed++;
    setBadge();
    if(driveAbort) break;

    // Adaptive pacing: grow the gap the more we've been throttled this run, and
    // if a 429/503 just landed, wait out the cooldown before touching the API again.
    let gap = Math.min(DRIVE_GAP_MAX, DRIVE_GAP_MS * (1 + RATE_LIMIT_HITS));
    const cooldown = RATE_LIMIT_UNTIL - Date.now();
    if(cooldown > 0) gap = Math.max(gap, cooldown);
    await driveSleep(gap);
  }

  driveRunning=false;
  try{ if(wake) await wake.release(); }catch(_){}
  document.body.classList.remove("drive-dark");   // restore normal theme when done
  if(btn){ btn.classList.remove("driving"); btn.removeAttribute("data-prog"); }
  render();
  if(driveAbort) toast(tr("driveStopped")(done, locations.length));
  else if(failed) toast(tr("driveDonePartial")(locations.length-failed, locations.length));
  else toast(tr("driveDone")(locations.length, skipped));
}

/* live count of rainy days from cached daily data, using the current threshold */
function rainyCount(days){
  return days.filter(d=>d.mm!=null && d.mm>=RAIN_DAY_MM).length;
}

/* dry-spell analysis: a "dry day" = below the chosen rainy threshold.
   Returns current ongoing streak (up to the last day) and the longest spell. */
function drySpells(days){
  // known days only, in chronological order
  const seq=days.filter(d=>d.mm!=null);
  let longest=0, longestEnd=-1, run=0;
  for(let i=0;i<seq.length;i++){
    if(seq[i].mm<RAIN_DAY_MM){ run++; if(run>longest){longest=run; longestEnd=i;} }
    else run=0;
  }
  // current streak = dry days at the very end of the sequence
  let cur=0;
  for(let i=seq.length-1;i>=0;i--){ if(seq[i].mm<RAIN_DAY_MM) cur++; else break; }
  let longestRange=null;
  if(longest>0 && longestEnd>=0){
    longestRange={start:seq[longestEnd-longest+1].date, end:seq[longestEnd].date};
  }
  let currentRange=null;
  if(cur>0){
    currentRange={start:seq[seq.length-cur].date, end:seq[seq.length-1].date};
  }

  // Season-scoped longest: only spells that FALL WITHIN this calendar year
  // (since Jan 1). With 16 months of history the all-time longest can belong to
  // LAST year's cycle and mask the spell driving THIS season's flowering, so this
  // is the figure the card leads with. A spell counts if any of its days are in
  // the current year; we measure only the in-year portion of the run.
  const jan1 = `${new Date().getFullYear()}-01-01`;
  let sLongest=0, sEnd=-1, sRun=0;
  for(let i=0;i<seq.length;i++){
    const inYear = seq[i].date>=jan1;
    if(seq[i].mm<RAIN_DAY_MM && inYear){ sRun++; if(sRun>sLongest){sLongest=sRun; sEnd=i;} }
    else sRun=0;   // wet day OR pre-Jan-1 day breaks the in-year run
  }
  let seasonRange=null;
  if(sLongest>0 && sEnd>=0){
    seasonRange={start:seq[sEnd-sLongest+1].date, end:seq[sEnd].date};
  }

  return {current:cur, longest, longestRange, currentRange,
          seasonLongest:sLongest, seasonRange};
}
function fmtMD(dateStr){               // "2026-05-03" -> "3/5" (dd/mm, Malaysian)
  const m=parseInt(dateStr.slice(5,7),10), d=parseInt(dateStr.slice(8,10),10);
  return d+"/"+m;
}
/* single date for a 1-day spell, range otherwise */
function spellDates(range){
  if(!range) return "";
  return range.start===range.end ? fmtMD(range.start) : `${fmtMD(range.start)}–${fmtMD(range.end)}`;
}
function dryStreakHTML(days){
  const s=drySpells(days);
  if(s.longest===0) return ""; // no dry days at all in window — nothing to show
  // Staged bud-emergence flag on the ONGOING streak (research: 14–18 dry days
  // lift induction odds; raise an early flag from 12 to give farmers lead time).
  const cur=s.current;
  let flag="";
  if(cur>=19){
    flag=`<div class="dry-flag past"><span class="df-ic">🌸</span><span class="df-t">${tr("flagPast")(cur)}</span></div>`;
  }else if(cur>=14){
    flag=`<div class="dry-flag prime"><span class="df-ic">🌸</span><span class="df-t">${tr("flagPrime")(cur)}</span></div>`;
  }else if(cur>=12){
    flag=`<div class="dry-flag near"><span class="df-ic">⚑</span><span class="df-t">${tr("flagNear")(cur)}</span></div>`;
  }
  const curHot = cur>=12;   // amber-highlight the current tile once the early flag is up
  const seasonTxt = spellDates(s.seasonRange);
  const longTxt = spellDates(s.longestRange);
  const curTxt = spellDates(s.currentRange);
  // Primary "longest" tile shows THIS season (since Jan 1) — the spell relevant to
  // the current flowering cycle. The 16-month all-time longest is kept as a small
  // secondary line so year-over-year context isn't lost.
  const allTimeLine = (s.longest>0 && s.longest!==s.seasonLongest)
    ? `<div class="dry-alltime">${tr("dryAllTime")(s.longest)}${longTxt?` · ${longTxt}`:""}</div>`
    : "";
  // The current-streak tile always shows a second line so it lines up with the
  // longest-spell tile (which always has a date range). When there's no ongoing
  // dry streak (0 days), a dash holds the line; 1+ days shows the date(s).
  const curLine = curTxt || "—";
  return `<div class="dry-wrap">
    <div class="dry-cap">${tr("dryTitle")}</div>
    ${flag}
    <div class="dry-row">
      <div class="dry-stat">
        <div class="dry-l">${tr("drySeasonLongest")}${seasonTxt?`<span class="dry-range">${seasonTxt}</span>`:""}</div>
        <div class="dry-n tabular">${s.seasonLongest}<span class="dry-u">${tr("dayUnit")}</span></div>
      </div>
      <div class="dry-stat ${curHot?"hot":""}">
        <div class="dry-l">${tr("dryCurrent")}<span class="dry-range">${curLine}</span></div>
        <div class="dry-n tabular">${s.current}<span class="dry-u">${tr("dayUnit")}</span></div>
      </div>
    </div>
    ${allTimeLine}
  </div>`;
}

/* aggregate daily records into months (chronological) */
function monthlyAgg(days){
  const map=new Map();
  days.forEach(d=>{
    const key=d.date.slice(0,7); // YYYY-MM
    if(!map.has(key)) map.set(key,{key,mm:0,rainy:0,known:0,total:0});
    const o=map.get(key);
    o.total++;
    if(d.mm!=null){ o.mm+=d.mm; o.known++; if(d.mm>=RAIN_DAY_MM) o.rainy++; }
  });
  return [...map.values()].sort((a,b)=>a.key<b.key?-1:1);
}
/* total shown to the user = sum of the monthly figures AS DISPLAYED (each rounded to 0.1),
   so the headline always equals what the farmer adds up from the monthly rows. */
function displayTotal(days){
  return monthlyAgg(days).reduce((a,m)=>a+Math.round(m.mm*10)/10, 0);
}
function monthLabel(key){
  const m=parseInt(key.slice(5,7),10);
  const yr=key.slice(2,4);
  return tr("monthNames")[m-1]+" '"+yr;
}

/* 18-day mini bar strip */
function miniChartHTML(days){
  const last=days.slice(-18);
  if(!last.length) return "";
  const max=Math.max(...last.map(d=>d.mm==null?0:d.mm),1);
  const bars=last.map(d=>{
    if(d.mm==null){
      return `<div class="mini-col"><div class="mini-bar nodata" style="height:8%"></div></div>`;
    }
    const h=Math.max(2,Math.round((d.mm/max)*100));
    const cls=d.mm>=RAIN_DAY_MM?"wet":"dry";
    return `<div class="mini-col"><div class="mini-bar ${cls}" style="height:${h}%"></div></div>`;
  }).join("");
  const first=fmtMD(last[0].date);
  const lastD=fmtMD(last[last.length-1].date);
  return `<div class="mini-wrap">
    <div class="mini-cap"><span>${tr("last14")}</span><span class="mx">${tr("maxLabel")(max.toFixed(1))}</span></div>
    <div class="mini-bars">${bars}</div>
    <div class="mini-axis"><span>${first}</span><span>${lastD}</span></div>
  </div>`;
}

/* 18-day Delta-T trendline (historical, neutral — no spray verdict bands).
   Delta-T is drawn in the UPPER band and daily-high temperature in the LOWER band,
   so the two lines never tangle. Each band scales to its own min/max. */
function deltaTHTML(days){
  const last=days.slice(-18);
  const dtPts=last.map((d,i)=>({i,dt:d.dt})).filter(p=>p.dt!=null);
  if(dtPts.length<2) return ""; // not enough Delta-T data to draw a trend
  const tPts=last.map((d,i)=>({i,t:d.tmax})).filter(p=>p.t!=null);
  const hasTemp=tPts.length>=2;
  const W=300, H=120, padX=6;
  const n=last.length;
  const x=i=> padX + (n<=1?0:(i/(n-1))*(W-2*padX));
  // band scaler: maps a value to y within [top,bottom] using the data's own min/max.
  // If `must` is given, the domain is widened to include it (so a reference line at
  // that value always has a true position even when no data point reaches it).
  const bandScale=(arr,getv,top,bottom,must)=>{
    let lo=Math.min(...arr.map(getv)), hi=Math.max(...arr.map(getv));
    if(must!=null){ lo=Math.min(lo,must); hi=Math.max(hi,must); }
    if(hi-lo<1.5){ const mid=(hi+lo)/2; lo=mid-0.75; hi=mid+0.75; }
    return v=> top + (1-(v-lo)/(hi-lo))*(bottom-top);
  };
  // Upper band for Delta-T, lower band for temperature, with a gap between.
  // Force the 10 threshold into the band's value domain so the dashed reference
  // line below always sits at a true, comparable position relative to the trend.
  const DT_THRESH=10;
  const yDT=bandScale(dtPts,p=>p.dt, 10, 52, DT_THRESH);
  const dtLine=dtPts.map(p=>`${x(p.i).toFixed(1)},${yDT(p.dt).toFixed(1)}`).join(" ");
  const dtDots=dtPts.map(p=>{
    const over=p.dt>DT_THRESH;
    return `<circle cx="${x(p.i).toFixed(1)}" cy="${yDT(p.dt).toFixed(1)}" r="${over?2.8:2.3}" fill="${over?"#dc2626":"#6366f1"}"/>`;
  }).join("");
  // Red dashed threshold line at ΔT=10: above it, spray evaporates too fast.
  const yThresh=yDT(DT_THRESH);
  // keep the label inside the band: drop it below the line if the line hugs the top
  const lblY = yThresh < 18 ? yThresh+9 : yThresh-3;
  const threshLine=`<line x1="0" y1="${yThresh.toFixed(1)}" x2="${W}" y2="${yThresh.toFixed(1)}" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.75"/>`
    +`<text x="${(W-2).toFixed(1)}" y="${lblY.toFixed(1)}" text-anchor="end" font-size="8" font-weight="800" fill="#dc2626">ΔT 10</text>`;
  let tempSvg="", maxLabel="", tThreshLine="";
  if(hasTemp){
    // Force 30°C into the band domain so the flower-induction reference line below
    // always has a true position relative to the daily-high trend.
    const TEMP_THRESH=30;
    const yT=bandScale(tPts,p=>p.t, 80, 108, TEMP_THRESH);
    const tLine=tPts.map(p=>`${x(p.i).toFixed(1)},${yT(p.t).toFixed(1)}`).join(" ");
    // Days at/above 30°C favour flower induction → mark them in a deeper amber.
    const tDots=tPts.map(p=>{
      const hot=p.t>=TEMP_THRESH;
      return `<circle cx="${x(p.i).toFixed(1)}" cy="${yT(p.t).toFixed(1)}" r="${hot?2.6:2}" fill="${hot?"#d97706":"#f59e0b"}"/>`;
    }).join("");
    tempSvg=`<polyline fill="none" stroke="#f59e0b" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" points="${tLine}"/>${tDots}`;
    // Green dashed reference at 30°C: at/above it, heat + dry spell eases flowering.
    const yT30=yT(TEMP_THRESH);
    const t30lblY = yT30 > 100 ? yT30-4 : yT30+10;   // keep label inside band
    tThreshLine=`<line x1="0" y1="${yT30.toFixed(1)}" x2="${W}" y2="${yT30.toFixed(1)}" stroke="#059669" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.7"/>`
      +`<text x="${(W-2).toFixed(1)}" y="${t30lblY.toFixed(1)}" text-anchor="end" font-size="8" font-weight="800" fill="#059669">30°C</text>`;
    // Daily-high value on EVERY point, horizontal and sitting above each dot.
    // Adjacent labels are staggered (alternating higher/lower) so they don't collide
    // at phone width; edge labels are anchored inward to stay inside the viewBox.
    maxLabel=tPts.map((p,k)=>{
      const px=x(p.i);
      const py=yT(p.t) - (k%2===0 ? 6 : 14);   // stagger: even higher, odd higher still
      const anchor = px>W-14 ? "end" : (px<14 ? "start" : "middle");
      return `<text x="${px.toFixed(1)}" y="${py.toFixed(1)}" text-anchor="${anchor}" font-size="7.5" font-weight="700" fill="#b45309">${p.t.toFixed(1)}</text>`;
    }).join("");
  }
  const first=fmtMD(last[0].date);
  const lastD=fmtMD(last[last.length-1].date);
  const latestDT=dtPts[dtPts.length-1].dt;
  const legend=hasTemp?`<div class="dt-legend">
    <span><i class="dot-dt"></i>${tr("dtLegendDT")}</span>
    <span><i class="dot-temp"></i>${tr("dtLegendTemp")}</span>
  </div>`:``;
  const nowTxt=`${tr("dtLatest")} ${tr("dtAbbr")} ${latestDT.toFixed(1)}`;
  // faint divider between the two bands
  const divider=hasTemp?`<line x1="0" y1="62" x2="${W}" y2="62" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2 4"/>`:``;
  return `<div class="dt-wrap">
    <div class="dt-cap"><span>${tr("dtTitle")} <span class="dt-sub">${tr("dtTitleSub")}</span></span><span class="dt-now">${nowTxt}</span></div>
    ${legend}
    <svg class="dt-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      ${divider}
      ${threshLine}
      <polyline fill="none" stroke="#6366f1" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" points="${dtLine}"/>
      ${dtDots}
      ${tThreshLine}
      ${tempSvg}
      ${maxLabel}
    </svg>
    <div class="dt-axis"><span>${first}</span><span>${lastD}</span></div>
    <div class="dt-ref">${tr("dtRef")}</div>
  </div>`;
}

/* monthly rollup bars */
function monthRollupHTML(days){
  const months=monthlyAgg(days);
  if(months.length<2) return "";
  const max=Math.max(...months.map(m=>m.mm),1);
  const rows=months.map(m=>{
    const w=Math.max(3,Math.round((m.mm/max)*100));
    // partial if not every calendar day of that month is in our window/data
    const dim=new Date(parseInt(m.key.slice(0,4)),parseInt(m.key.slice(5,7)),0).getDate();
    const partial=(m.known<dim);
    const star=partial?`<span class="month-partial" title="${tr("partialNote")}">*</span>`:"";
    return `<div class="month-row">
      <div class="month-name">${monthLabel(m.key)}${star}</div>
      <div class="month-track"><div class="month-fill" style="width:${w}%"></div></div>
      <div class="month-mm tabular">${m.mm.toFixed(1)}</div>
      <div class="month-days tabular">${m.rainy}${lang==="zh"?"天":"d"}</div>
    </div>`;
  }).join("");
  const anyPartial=months.some(m=>{const dim=new Date(parseInt(m.key.slice(0,4)),parseInt(m.key.slice(5,7)),0).getDate(); return m.known<dim;});
  const note=anyPartial?`<div class="month-note">${tr("partialNote")}</div>`:"";
  return `<div class="month-wrap">
    <div class="month-cap">${tr("byMonth")}</div>
    ${rows}
    ${note}
  </div>`;
}

function useGPS(){
  const s=document.getElementById("gpsStatus");
  if(!navigator.geolocation){s.style.color="#ef4444"; s.textContent=tr("gpsNo"); return}
  s.style.color="#94a3b8"; s.textContent=tr("gpsWait");
  navigator.geolocation.getCurrentPosition(p=>{
    document.getElementById("inLat").value=p.coords.latitude.toFixed(6);
    document.getElementById("inLng").value=p.coords.longitude.toFixed(6);
    s.style.color="#047857"; s.textContent=tr("gpsOk");
  },()=>{s.style.color="#ef4444"; s.textContent=tr("gpsFail")},
  {enableHighAccuracy:true,timeout:10000,maximumAge:0});

function saveLoc(){
  const name=document.getElementById("inName").value.trim();
  const lat=parseFloat(document.getElementById("inLat").value);
  const lng=parseFloat(document.getElementById("inLng").value);
  const s=document.getElementById("gpsStatus");
  if(!name){s.style.color="#ef4444"; s.textContent=tr("needName"); return}
  if(isNaN(lat)||isNaN(lng)||lat<-90||lat>90||lng<-180||lng>180){s.style.color="#ef4444"; s.textContent=tr("needCoords"); return}
  if(editId){
    const loc=locations.find(l=>l.id===editId);
    if(loc){
      const moved=(loc.lat!==lat||loc.lng!==lng);
      loc.name=name; loc.lat=lat; loc.lng=lng;
      if(moved) delete cache[editId]; // coords changed -> old rainfall no longer valid
      saveLoc_(); saveCache();
    }
  }else{
    locations.push({id:"L"+Date.now(),name,lat,lng});
    saveLoc_();
  }
  closeSheet(); render();
}

/* ===== soft delete / recycle bin ===== */
function softDelete(id){
  const i=locations.findIndex(l=>l.id===id); if(i<0) return;
  if(swipeCurrentId) closeCardActions(swipeCurrentId);
  const loc=locations[i];
  bin.unshift({...loc, deletedAt:Date.now()});
  locations.splice(i,1);
  saveLoc_(); saveBin(); render(); updateBinCount();
}
function restoreLoc(id){
  const i=bin.findIndex(l=>l.id===id); if(i<0) return;
  const {deletedAt, ...loc}=bin[i];
  if(locations.some(l=>l.id===loc.id)) loc.id="L"+Date.now();
  locations.push(loc);
  bin.splice(i,1);
  saveLoc_(); saveBin(); render(); renderBin(); updateBinCount();
}
function purgeLoc(id){
  const loc=bin.find(l=>l.id===id); if(!loc) return;
  if(confirm(tr("confirmPurge")(loc.name))){
    bin=bin.filter(l=>l.id!==id);
    delete cache[id];
    saveBin(); saveCache(); renderBin(); updateBinCount();
  }
}
function renderBin(){
  const box=document.getElementById("binList");
  if(!box) return;
  if(!bin.length){ box.innerHTML=`<div class="bin-empty">${tr("binEmpty")}</div>`; return; }
  box.innerHTML=bin.map(loc=>`<div class="bin-row">
    <div class="bin-info">
      <div class="bin-name">${esc(loc.name)}</div>
      <div class="bin-coords tabular">${(+loc.lat).toFixed(4)}, ${(+loc.lng).toFixed(4)}</div>
    </div>
    <button class="bin-btn bin-purge" onclick="purgeLoc('${loc.id}')">${tr("purge")}</button>
    <button class="bin-btn bin-restore" onclick="restoreLoc('${loc.id}')">${tr("restore")}</button>
  </div>`).join("");
}
function updateBinCount(){
  const badge=document.getElementById("binCount");
  if(!badge) return;
  if(bin.length){ badge.textContent=bin.length; badge.classList.remove("hidden"); }
  else badge.classList.add("hidden");
}
/* switch between Add view and Recycle view inside the + dialog */

/* ===== share (placeholder hook — content TBD) ===== */
async function shareLoc(id){
  const loc=locations.find(l=>l.id===id); if(!loc) return;
  if(swipeCurrentId) closeCardActions(swipeCurrentId);
  const c=cache[id];
  const card=document.getElementById("content-"+id);

  // Share text is framed around the flowering-induction signal — that's why a
  // farmer shares: an ongoing dry streak (plus heat) is the trigger to act on.
  // We lead with the current dry streak and how many of those days hit 30°C+,
  // not the historical totals (which aren't what excites them to share).
  const textMsg=()=>{
    let m=`🌧️ ${loc.name}`;
    if(c&&c.days&&c.days.length){
      const s=drySpells(c.days);
      m+=`\n${tr("shFlower")}`;
      if(s.current>0){
        // count, within the trailing dry run, days whose high reached 30°C+
        const seq=c.days.filter(d=>d.mm!=null);
        const tail=seq.slice(-s.current);
        const hot=tail.filter(d=>d.tmax!=null && d.tmax>=30).length;
        const range=spellDates(s.currentRange);
        m+=`\n${tr("shCur")}: ${s.current} ${tr("shDayUnit")}${range?` (${range})`:""}`;
        m+=`\n${tr("shHot")}: ${hot} ${tr("shDayUnit")}`;
      }else{
        m+=`\n${tr("shNone")}`;
        // Lead with THIS YEAR's longest (relevant to the current cycle); add the
        // 16-month peak only if it's a different, larger figure (last-year context).
        if(s.seasonLongest>0){
          const sr=spellDates(s.seasonRange);
          m+=`\n${tr("shSeasonHist")}: ${s.seasonLongest} ${tr("shDayUnit")}${sr?` (${sr})`:""}`;
        }
        if(s.longest>0 && s.longest!==s.seasonLongest){
          const lr=spellDates(s.longestRange);
          m+=`\n${tr("shHist")}: ${s.longest} ${tr("shDayUnit")}${lr?` (${lr})`:""}`;
        }
      }
    }
    m+=`\n${tr("attrib")}`;
    return m;
  };

  // No data yet, or capture lib missing -> just share text
  if(!c||!c.days||!c.days.length||typeof html2canvas==="undefined"){
    window.open("https://wa.me/?text="+encodeURIComponent(textMsg()),"_blank");
    return;
  }

  const grip=card.querySelector(".grip");
  const btnRow=card.querySelector(".btn-row");
  const statusEl=card.querySelector(".card-status");
  // hide interactive bits that shouldn't appear in a shared snapshot
  if(grip) grip.style.visibility="hidden";
  if(btnRow) btnRow.style.display="none";
  if(statusEl) statusEl.style.display="none";

  try{
    const canvas=await html2canvas(card,{backgroundColor:"#ffffff",scale:2,useCORS:true,logging:false});
    // restore UI immediately
    if(grip) grip.style.visibility="";
    if(btnRow) btnRow.style.display="";
    if(statusEl) statusEl.style.display="";

    const blob=await new Promise(res=>canvas.toBlob(res,"image/png"));
    if(!blob) throw new Error("no blob");
    const safe=loc.name.replace(/[\\\/:*?"<>|]/g,"_");
    const file=new File([blob],`${safe}_rainlog.png`,{type:"image/png"});

    // Preferred path: native share sheet WITH the image file -> farmer picks WhatsApp
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:loc.name, text:textMsg()});
      return;
    }
    // Fallback: download the image so the farmer can attach it manually
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=file.name; document.body.appendChild(a); a.click();
    a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){
    // restore + final fallback to text share
    if(grip) grip.style.visibility="";
    if(btnRow) btnRow.style.display="";
    if(statusEl) statusEl.style.display="";
    if(e && e.name==="AbortError") return; // user cancelled the share sheet — do nothing
    window.open("https://wa.me/?text="+encodeURIComponent(textMsg()),"_blank");
  }
}

/* ===== swipe-reveal + right-click (bar slides in, card stays put) ===== */
let swipeCurrentId=null, swipeStartX=0, swipeStartY=0, swipeDir=null, isSwiping=false;

function openCardActions(id){
  const wrap=document.getElementById("content-"+id)?.closest(".card-wrap");
  if(!wrap) return;
  wrap.classList.add("actions-open");
  swipeCurrentId=id;
}
function closeCardActions(id){
  const wrap=document.getElementById("content-"+id)?.closest(".card-wrap");
  if(wrap) wrap.classList.remove("actions-open");
  if(swipeCurrentId===id) swipeCurrentId=null;
}
function handleTouchStart(e,id){
  if(swipeCurrentId&&swipeCurrentId!==id) closeCardActions(swipeCurrentId);
  swipeStartX=e.touches[0].clientX; swipeStartY=e.touches[0].clientY; isSwiping=false; swipeDir=null;
}
function handleTouchMove(e,id){
  const dx=e.touches[0].clientX-swipeStartX, dy=e.touches[0].clientY-swipeStartY;
  if(!swipeDir){
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){ swipeDir="h"; }
    else if(Math.abs(dy)>10){ swipeDir="v"; }
  }
  if(swipeDir==="h"){
    isSwiping=true;
    if(e.cancelable) e.preventDefault();
  }
}
function handleTouchEnd(e,id){
  if(swipeDir==="v"){ return; }
  if(swipeDir!=="h"){
    // A tap (no horizontal drag). If this card's actions are already open and the
    // tap landed on the card itself (not an action button), treat it as "cancel".
    if(swipeCurrentId===id && !e.target.closest(".swipe-actions")){
      closeCardActions(id);
      if(e.cancelable) e.preventDefault();   // stop the follow-up click from re-toggling
    }
    return;
  }
  const dx=e.changedTouches[0].clientX-swipeStartX;
  if(dx<-40) openCardActions(id);        // swipe left -> open
  else if(dx>40) closeCardActions(id);   // swipe right -> close
  setTimeout(()=>isSwiping=false,50);
}
function handleContextMenu(e,id){      // right-click toggles (primary desktop path)
  e.preventDefault();
  if(swipeCurrentId&&swipeCurrentId!==id) closeCardActions(swipeCurrentId);
  if(swipeCurrentId===id) closeCardActions(id); else openCardActions(id);
}
function toggleCardActions(id){        // the ⋯ grip button — works on every device
  if(swipeCurrentId&&swipeCurrentId!==id) closeCardActions(swipeCurrentId);
  if(swipeCurrentId===id) closeCardActions(id); else openCardActions(id);
}
/* tap elsewhere closes an open card; tapping the open card's own surface
   (anywhere except an action button) also cancels it */
document.addEventListener("click",e=>{
  if(!swipeCurrentId) return;
  const wrap=e.target.closest(".card-wrap");
  if(!wrap){ closeCardActions(swipeCurrentId); return; }   // tapped outside any card
  // tapped inside a card: cancel only if it's the open card and not an action button
  if(wrap.id==="wrap-"+swipeCurrentId && !e.target.closest(".swipe-actions") && !e.target.closest(".grip")){
    closeCardActions(swipeCurrentId);
  }
});
/* date helper: YYYY-MM-DD in local time */
function ymd(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}
/* Delta-T (°C) = dry-bulb − wet-bulb, from air temp (°C) and relative humidity (%).
   Wet-bulb via Stull (2011) empirical approximation — accurate for normal field conditions.
   Spray-band reference: 2–8 ideal, 8–10 marginal, >10 too evaporative, <2 too humid. */
function deltaT(T, RH){
  if(T==null||RH==null) return null;
  RH=Math.max(1,Math.min(100,RH));
  const Tw = T*Math.atan(0.151977*Math.sqrt(RH+8.313659))
           + Math.atan(T+RH) - Math.atan(RH-1.676331)
           + 0.00391838*Math.pow(RH,1.5)*Math.atan(0.023101*RH)
           - 4.686035;
  const d = T - Tw;
  return (isFinite(d) && d>=0) ? d : null;
}
/* On launch: refresh only farms whose data is from a previous day, one at a time
   (throttled), skipping entirely when offline. Keeps the numbers current without
   bursting Open-Meteo. */
function isFromPreviousDay(ts){
  if(!ts) return true;                       // never fetched in this cache shape -> treat as stale
  const f=new Date(ts), n=new Date();
  return f.getFullYear()!==n.getFullYear() || f.getMonth()!==n.getMonth() || f.getDate()!==n.getDate();
}
let autoRefreshing=false;
async function autoRefreshStale(){
  if(autoRefreshing) return;                 // don't overlap runs
  if(navigator.onLine===false) return;       // offline: keep showing cached data, don't error
  // queue farms that have data but it's from a previous day
  const queue=locations.filter(l=>{
    const c=cache[l.id];
    return c && c.days && c.days.length && isFromPreviousDay(c.fetched);
  });
  if(!queue.length) return;
  autoRefreshing=true;
  try{
    for(const loc of queue){
      try{ await getRain(loc.id); }catch(_){}   // getRain handles its own errors/UI
      await new Promise(r=>setTimeout(r, 1200)); // throttle: ~1.2s gap between farms
    }
  }finally{ autoRefreshing=false; }
}
/* Resilient fetch for Open-Meteo. With 114 seeded farms a tester can fire many
   requests in a session and hit 429 (rate limit) or 503 (busy). A bare fetch would
   silently fail and the farm would show no data. This retries those with capped
   exponential backoff + jitter, honouring Retry-After when present. Returns parsed
   JSON, or null if the response is non-retryable-not-ok, or throws after giving up. */
async function fetchJSON(url, {tries=4}={}){
  let wait=600;
  for(let attempt=0; attempt<tries; attempt++){
    let res;
    try{ res=await fetch(url); }
    catch(e){ if(attempt===tries-1) throw e; await sleep(wait+Math.random()*300); wait=Math.min(wait*2,8000); continue; }
    if(res.ok) return res.json();
    if(res.status===429 || res.status===503){
      // Signal the drive loop that Open-Meteo is throttling, so it can slow the
      // whole fleet down — not just this one request's local retry.
      RATE_LIMIT_HITS++;
      RATE_LIMIT_UNTIL = Date.now() + 15000;   // hold the loop back for ~15s
      if(attempt===tries-1) return null;            // give up quietly; caller treats as missing
      const ra=parseInt(res.headers.get("Retry-After")||"",10);
      const delay=(!isNaN(ra)?ra*1000:wait)+Math.random()*300;
      await sleep(delay); wait=Math.min(wait*2,8000); continue;
    }
    return null;                                     // other non-ok (4xx/5xx): not retryable
  }
  return null;
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* Concurrency limiter: run worker over items, at most `max` in flight at once.
   Used by the bulk region refresh so we never burst the API. */
async function runPooled(items, worker, max=2){
  const queue=items.slice(); const running=[];
  async function next(){
    if(!queue.length) return;
    const item=queue.shift();
    const p=Promise.resolve(worker(item)).finally(()=>{
      running.splice(running.indexOf(p),1);
    });
    running.push(p);
    if(running.length>=max) await Promise.race(running);
    return next();
  }
  await next();
  await Promise.all(running);
}

async function getRain(id, opts={}){
  const loc=locations.find(l=>l.id===id); if(!loc) return false;
  const btn=document.getElementById("ld-"+id);
  const st=document.getElementById("st-"+id);
  if(btn){ btn.disabled=true; btn.innerHTML=`<span class="spin"></span> ${tr("loading")}`; }
  if(st){ st.style.color="#94a3b8"; st.textContent=""; }
  try{
    // ------------------------------------------------------------------
    // Window: 16 months of history so BOTH durian cycles a year stay
    // visible (dry-spell -> flowering -> harvest, repeating). ERA5 archive
    // serves the full range; we only FETCH the recent tail each time and
    // MERGE it onto whatever history is already cached, so the 16-month
    // record accumulates instead of being re-downloaded every refresh.
    // ------------------------------------------------------------------
    const HISTORY_MONTHS = 16;   // rainfall + daily max-temp span
    const DT_DAYS        = 18;   // hourly Delta-T span (dry-stress / bud-emergence window)
    const now=new Date();
    const yesterday=new Date(now); yesterday.setDate(now.getDate()-1);
    const start=new Date(now.getFullYear(), now.getMonth()-(HISTORY_MONTHS-1), 1); // 1st of the month, 16 months back
    const startStr=ymd(start), endStr=ymd(yesterday);

    // Seed the full 16-month skeleton with null (honest "no data"),
    // then carry forward any values already stored from previous fetches.
    const merged=new Map();     // date -> mm
    const tmaxMap=new Map();    // date -> °C daily high
    const dtMap=new Map();      // date -> highest Delta-T in its 12:00–15:00 window
    for(let d=new Date(start); d<=yesterday; d.setDate(d.getDate()+1)){
      merged.set(ymd(d), null);
    }
    const prevDays=(cache[id] && Array.isArray(cache[id].days)) ? cache[id].days : [];
    for(const pd of prevDays){
      if(!merged.has(pd.date)) continue;            // outside the 16-month window -> drop (rolls off)
      if(pd.mm!=null)   merged.set(pd.date, pd.mm);
      if(pd.tmax!=null) tmaxMap.set(pd.date, pd.tmax);
      if(pd.dt!=null)   dtMap.set(pd.date, pd.dt);
    }

    // Fetch strategy:
    //  - First fetch (no history yet), a forced backfill, OR an orchard whose
    //    stored history doesn't yet cover the full 16 months (e.g. built under the
    //    old 4-month code): pull the FULL window so the gap self-heals. After that
    //    one full run the record is complete, so every later run takes the light path.
    //  - Normal refresh (history already spans the window): only re-pull a ~120-day
    //    tail. Older ERA5 days are final reanalysis and don't change.
    const haveHistory = prevDays.some(d=>d.mm!=null);
    const tailDays = 120;
    // Has this orchard ever been fetched all the way back to the window start?
    // `coveredFrom` records the earliest date a prior fetch actually requested.
    // If it's absent or newer than our window start, there's an un-fetched older
    // stretch the tail can't reach -> pull the full window once to self-heal.
    const coveredFrom = (cache[id] && cache[id].coveredFrom) || null;
    const olderGap = !coveredFrom || coveredFrom > startStr;
    const wantFull = opts.force || !haveHistory || olderGap;
    const tailStart=new Date(yesterday);
    if(wantFull){ tailStart.setTime(start.getTime()); }        // full 16-month window
    else        { tailStart.setDate(yesterday.getDate()-(tailDays-1)); }
    if(tailStart<start) tailStart.setTime(start.getTime());
    const tailStartStr=ymd(tailStart);

    // Delta-T only for the last DT_DAYS days — keeps the heavy hourly payload tiny.
    const dtStart=new Date(yesterday); dtStart.setDate(yesterday.getDate()-(DT_DAYS-1));
    if(dtStart<start) dtStart.setTime(start.getTime());
    const dtStartStr=ymd(dtStart), dtPastDays=Math.min(92, DT_DAYS+2);

    const apply=(dates,vals)=>{
      if(!dates) return;
      dates.forEach((dt,i)=>{
        const v=vals?vals[i]:null;
        if(merged.has(dt) && v!=null && !isNaN(v)) merged.set(dt, v);
      });
    };
    const applyTmax=(times,maxes)=>{
      if(!times) return;
      times.forEach((t,i)=>{
        const v=maxes?maxes[i]:null;
        if(v!=null && !isNaN(v)) tmaxMap.set(t, v);  // fresher source overwrites older
      });
    };
    const applyHourly=(times,temps,rhs)=>{
      if(!times) return;
      times.forEach((t,i)=>{
        const hr=parseInt(t.slice(11,13),10);       // "2026-05-03T13:00" -> 13
        if(hr<12 || hr>15) return;                  // only the 12:00–15:00 spray-risk window
        const T=temps?temps[i]:null, RH=rhs?rhs[i]:null;
        if(T==null||RH==null||isNaN(T)||isNaN(RH)) return;
        const dt=deltaT(T,RH);
        if(dt==null) return;
        const day=t.slice(0,10);
        const prev=dtMap.get(day);
        if(prev==null || dt>prev) dtMap.set(day, dt);  // keep the worst (highest) of the window
      });
    };

    // 1) Archive (ERA5) — daily rainfall + max-temp for the recent tail only.
    const archiveUrl=`https://archive-api.open-meteo.com/v1/archive?latitude=${loc.lat}&longitude=${loc.lng}`
      +`&start_date=${tailStartStr}&end_date=${endStr}&daily=precipitation_sum,temperature_2m_max&timezone=auto`;
    // 2) Forecast past_days — fills the last few days ERA5 hasn't finalized AND
    //    supplies the full DT_DAYS hourly window for Delta-T (past_days covers it),
    //    so we don't need a separate hourly archive call. One fewer request/orchard.
    const fcUrl=`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lng}`
      +`&daily=precipitation_sum,temperature_2m_max&hourly=temperature_2m,relative_humidity_2m`
      +`&past_days=${dtPastDays}&forecast_days=0&timezone=auto`;

    let archiveOk=false, fcOk=false;
    // Archive daily (bulk of the tail)
    try{
      const aj=await fetchJSON(archiveUrl);
      if(aj){
        apply(aj.daily?.time, aj.daily?.precipitation_sum);
        applyTmax(aj.daily?.time, aj.daily?.temperature_2m_max);
        archiveOk=true; }
    }catch(_){}
    // Forecast — recent daily values + hourly Delta-T for the last DT_DAYS days
    try{
      const fj=await fetchJSON(fcUrl);
      if(fj){
        apply(fj.daily?.time, fj.daily?.precipitation_sum);
        applyTmax(fj.daily?.time, fj.daily?.temperature_2m_max);
        applyHourly(fj.hourly?.time, fj.hourly?.temperature_2m, fj.hourly?.relative_humidity_2m);
        fcOk=true; }
    }catch(_){}

    // Accept the fetch if a source responded OR we still hold prior history to keep.
    if(!archiveOk && !fcOk && !prevDays.length) throw new Error("both sources failed");

    // Drop Delta-T readings older than the DT_DAYS window (we no longer refresh them,
    // and they aren't actionable for spray timing beyond ~18 days).
    for(const k of [...dtMap.keys()]){ if(k < dtStartStr) dtMap.delete(k); }

    // Build chronological day list (mm may be null = no data; dt may be null = no reading)
    const days=[...merged.keys()].sort().map(date=>({
      date, mm:merged.get(date),
      dt:(dtMap.has(date)?Math.round(dtMap.get(date)*10)/10:null),
      tmax:(tmaxMap.has(date)?Math.round(tmaxMap.get(date)*10)/10:null)
    }));
    const known=days.filter(d=>d.mm!=null);
    const total=known.reduce((a,b)=>a+b.mm,0);
    const rainy=known.filter(d=>d.mm>=RAIN_DAY_MM).length;
    const missing=days.length-known.length;

    cache[id]={days,total,rainy,missing,stale:false,fetched:Date.now(),coveredFrom:(wantFull?startStr:(cache[id]&&cache[id].coveredFrom)||tailStartStr)};
    saveCache();
    if(!opts.quiet) render();
    return true;
  }catch(e){
    if(btn){
      btn.disabled=false;
      btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.2-8.6"/><polyline points="21 3 21 9 15 9"/></svg> ${cache[id]?tr("reget"):tr("get")}`;
    }
    if(st){ st.style.color="#ef4444"; st.textContent=tr("errFetch"); }
    return false;
  }
}
/* Cross-farm Excel export — tidy/long format, one row per (farm × date), plus a
   per-farm summary sheet. This is what a researcher pooling rainfall across farms
   wants: load farms (or refresh a region), then export one workbook covering them
   all. Uses SheetJS (already bundled), matching the per-farm Export Excel. */
function exportAllXLS(){
  const loaded=locations.filter(l=>cache[l.id]&&cache[l.id].days&&cache[l.id].days.length);
  if(!loaded.length){ toast(tr("exportNone")); return; }
  const wb=XLSX.utils.book_new();

  // Sheet 1 — tidy daily data, one row per (farm × date)
  const header=[tr("colFarm"),tr("colRegion"),tr("colLat"),tr("colLng"),tr("colDate"),tr("colMM"),tr("colDT"),tr("colTMax")];
  const rows=[header];
  for(const loc of loaded){
    for(const d of cache[loc.id].days){
      rows.push([
        loc.name, loc.region||"",
        Number(loc.lat.toFixed(5)), Number(loc.lng.toFixed(5)),
        d.date,
        d.mm==null?"":Number(d.mm.toFixed(1)),
        d.dt==null?"":Number(d.dt.toFixed(1)),
        d.tmax==null?"":Number(d.tmax.toFixed(1))
      ]);
    }
  }
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=[{wch:26},{wch:16},{wch:10},{wch:10},{wch:12},{wch:10},{wch:10},{wch:10}];
  ws["!autofilter"]={ref:`A1:H${rows.length}`};
  XLSX.utils.book_append_sheet(wb,ws,tr("dataSheet"));

  // Sheet 2 — per-farm summary
  const sHeader=[tr("colFarm"),tr("colRegion"),tr("total")+" (mm)",tr("rainy")+` (>=${RAIN_DAY_MM}mm)`,tr("daysCovered")];
  const sRows=[sHeader];
  for(const loc of loaded){
    const c=cache[loc.id];
    const known=c.days.filter(d=>d.mm!=null);
    sRows.push([
      loc.name, loc.region||"",
      Number(displayTotal(c.days).toFixed(1)),
      rainyCount(c.days),
      known.length
    ]);
  }
  const sws=XLSX.utils.aoa_to_sheet(sRows);
  sws["!cols"]=[{wch:26},{wch:16},{wch:14},{wch:18},{wch:14}];
  sws["!autofilter"]={ref:`A1:E${sRows.length}`};
  XLSX.utils.book_append_sheet(wb,sws,tr("summarySheet"));

  const stamp=ymd(new Date());
  XLSX.writeFile(wb,`rainlog-lab-all-farms-${stamp}.xlsx`);
  toast(tr("regionDone")(loaded.length));
}

function exportXLS(id){
  const loc=locations.find(l=>l.id===id);
  const c=cache[id];
  if(!loc||!c||!c.days){alert(tr("xlNoData")); return}
  const wk=tr("week");
  const header=[tr("colDate"),tr("colWeek"),tr("colMM"),tr("colDT"),tr("colTMax")];
  const rows=c.days.map(d=>{
    const dt=new Date(d.date+"T00:00:00");
    return [d.date,wk[dt.getDay()],(d.mm==null?"—":Number(d.mm.toFixed(1))),(d.dt==null?"—":Number(d.dt.toFixed(1))),(d.tmax==null?"—":Number(d.tmax.toFixed(1)))];
  });
  const knownCount=c.days.filter(d=>d.mm!=null).length;
  const aoa=[
    [loc.name,"",""],
    [`${loc.lat.toFixed(4)}, ${loc.lng.toFixed(4)}`,"",""],
    [],
    header,
    ...rows,
    [],
    [tr("sumLabel"),"",""],
    [tr("total")+" (mm)","",Number(displayTotal(c.days).toFixed(1))],
    [tr("rainy")+` (>=${RAIN_DAY_MM}mm)`,"",rainyCount(c.days)],
    [tr("daysTotal"),"",c.days.length],
    [tr("daysCovered"),"",knownCount]
  ];
  if(c.missing>0) aoa.push([tr("daysMissing"),"",c.missing]);
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws["!cols"]=[{wch:16},{wch:9},{wch:14},{wch:12},{wch:14}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,tr("sheetName"));

  const months=monthlyAgg(c.days);
  const maoa=[
    [loc.name,"",""],
    [],
    [tr("colMonth"),tr("colMonthMM"),tr("colMonthDays")],
    ...months.map(m=>{
      const dim=new Date(parseInt(m.key.slice(0,4)),parseInt(m.key.slice(5,7)),0).getDate();
      const label=monthLabel(m.key)+(m.known<dim?" *":"");
      return [label,Number(m.mm.toFixed(1)),m.rainy];
    })
  ];
  const anyPartial=months.some(m=>{const dim=new Date(parseInt(m.key.slice(0,4)),parseInt(m.key.slice(5,7)),0).getDate(); return m.known<dim;});
  if(anyPartial){ maoa.push([]); maoa.push([tr("partialNote"),"",""]); }
  const mws=XLSX.utils.aoa_to_sheet(maoa);
  mws["!cols"]=[{wch:14},{wch:20},{wch:12}];
  XLSX.utils.book_append_sheet(wb,mws,tr("monthSheet"));

  const safe=loc.name.replace(/[\\\/:*?"<>|]/g,"_");
  XLSX.writeFile(wb,`${safe}_rain.xlsx`);
}
Object.keys(cache).forEach(k=>{if(cache[k]) cache[k].stale=true});
applyLang();
window.addEventListener("load",()=>{
  setTimeout(()=>{
    const b=document.getElementById("boot-screen");
    if(b){b.style.opacity="0"; setTimeout(()=>b.remove(),420)}
  },650);
  // register service worker for offline use (silently ignore if unsupported)
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
  // Cached data shows instantly; then quietly refresh any farm whose data is from
  // a previous day (one at a time, skipped if offline).
  setTimeout(autoRefreshStale, 900);
});
// Relaunch from background (PWA reopened from app switcher) doesn't re-fire "load".
// Re-check on return to foreground; autoRefreshStale only acts if data is a day old.
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible") autoRefreshStale();
});
</script>
